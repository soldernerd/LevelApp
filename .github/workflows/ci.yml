name: CI/CD

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: read

jobs:
  build-test-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore LevelApp.slnx

      - name: Build (Release)
        run: dotnet build LevelApp.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test LevelApp.Tests/LevelApp.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content LevelApp.Core/AppVersion.cs -Raw
          $major = [regex]::Match($content, 'Major\s*=\s*(\d+)').Groups[1].Value
          $minor = [regex]::Match($content, 'Minor\s*=\s*(\d+)').Groups[1].Value
          $patch = [regex]::Match($content, 'Patch\s*=\s*(\d+)').Groups[1].Value
          $version = "$major.$minor.$patch"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT

      - name: Publish executables
        shell: pwsh
        run: |
          $publishDir = "publish"
          dotnet publish LevelApp.App/LevelApp.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output $publishDir
          dotnet publish LevelApp.Updater/LevelApp.Updater.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            --output $publishDir

      - name: Sign executables
        shell: pwsh
        env:
          CODE_SIGN_CERT: ${{ secrets.CODE_SIGN_CERT }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          if (-not $env:CODE_SIGN_CERT) {
            Write-Host "CODE_SIGN_CERT secret not configured — skipping signing"
            exit 0
          }
          $pfx = [Convert]::FromBase64String($env:CODE_SIGN_CERT)
          $pfxPath = "$env:TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfx)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f $pfxPath /p $env:CODE_SIGN_PASSWORD `
            /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
            "publish\LevelApp.App.exe" "publish\LevelApp.Updater.exe"
          Remove-Item $pfxPath

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path "publish\*" -DestinationPath "LevelApp-${{ steps.version.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: LevelApp ${{ steps.version.outputs.TAG }}
          files: LevelApp-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
